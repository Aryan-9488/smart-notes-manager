spring.application.name=SmartNotesManager
spring.config.import=optional:file:.env[.properties],optional:file:backend/notes/.env[.properties]
spring.data.mongodb.uri=${SMART_NOTES_MONGO_URI:mongodb://localhost:27017/smartnotesmanager?serverSelectionTimeoutMS=3000}
logging.level.org.springframework.data.mongodb=${MONGODB_LOG_LEVEL:INFO}
spring.data.mongodb.database=smartnotesmanager
spring.data.mongodb.auto-index-creation=true
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
